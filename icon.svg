<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Navy background -->
  <rect width="512" height="512" rx="80" fill="#0f1f3d"/>

  <!-- Clipboard body -->
  <rect x="116" y="58" width="280" height="212" rx="16" fill="#1a2f52" stroke="#f59e0b" stroke-width="13"/>

  <!-- Clipboard clip bar -->
  <rect x="184" y="38" width="144" height="48" rx="24" fill="#f59e0b"/>
  <!-- Clip hole -->
  <rect x="218" y="27" width="76" height="38" rx="19" fill="#0f1f3d" stroke="#f59e0b" stroke-width="6"/>

  <!-- Checkmark on clipboard -->
  <polyline points="148,178 206,238 368,114"
            fill="none" stroke="#f59e0b" stroke-width="27"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle divider -->
  <line x1="56" y1="302" x2="456" y2="302"
        stroke="#f59e0b" stroke-width="3" stroke-opacity="0.35"/>

  <!-- Large gold "5S" -->
  <text x="256" y="468"
        font-family="'Arial Black', Impact, 'Franklin Gothic Heavy', sans-serif"
        font-size="178" font-weight="900"
        fill="#f59e0b" text-anchor="middle">5S</text>
</svg>
